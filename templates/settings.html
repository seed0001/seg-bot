{% extends "base.html" %}
{% block content %}
<h1>SETTINGS</h1>

<form method="POST">
  <div class="card">
    <h2>Persona</h2>
    <p class="muted" style="margin-bottom:12px">This is the character the bot speaks in for all segments and lessons. Edit freely.</p>
    <div class="form-group">
      <label>Persona prompt</label>
      <textarea name="persona" rows="8">{{ persona }}</textarea>
    </div>
  </div>

  <div class="card">
    <h2>Voice & Model</h2>
    <div class="grid-2">
      <div class="form-group">
        <label>TTS Voice (Edge TTS)</label>
        <select name="tts_voice">
          {% for v in voices %}
          <option value="{{ v.ShortName }}" {% if v.ShortName == tts_voice %}selected{% endif %}>
            {{ v.ShortName }} — {{ v.FriendlyName }}
          </option>
          {% endfor %}
          {% if not voices %}
          <option value="en-US-AndrewNeural" selected>en-US-AndrewNeural (default)</option>
          {% endif %}
        </select>
        <span class="muted" style="font-size:11px;margin-top:4px;display:block">
          Default: en-US-AndrewNeural. Requires internet connection for Edge TTS.
        </span>
      </div>
      <div class="form-group">
        <label>Ollama Model</label>
        <select name="ollama_model">
          {% for m in models %}
          <option value="{{ m }}" {% if m == ollama_model %}selected{% endif %}>{{ m }}</option>
          {% endfor %}
          {% if not models %}
          <option value="{{ ollama_model }}" selected>{{ ollama_model }} (Ollama offline?)</option>
          {% endif %}
        </select>
        <span class="muted" style="font-size:11px;margin-top:4px;display:block">
          Pull models with: <code>ollama pull &lt;model&gt;</code>
        </span>
      </div>
    </div>
  </div>

  <button type="submit" class="btn">Save Settings</button>
</form>
{% endblock %}
