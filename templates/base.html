<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Segment Bot</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8ff00;
    --text: #e0e0e0;
    --muted: #666;
    --danger: #ff4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; font-size: 14px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    gap: 24px;
    align-items: center;
  }
  nav .brand { font-size: 16px; font-weight: bold; color: var(--accent); letter-spacing: 2px; }
  nav a { color: var(--text); font-size: 13px; }
  nav a:hover { color: var(--accent); text-decoration: none; }

  main { max-width: 1100px; margin: 32px auto; padding: 0 24px; }

  h1 { font-size: 22px; color: var(--accent); margin-bottom: 20px; letter-spacing: 1px; }
  h2 { font-size: 16px; color: var(--text); margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  h3 { font-size: 14px; color: var(--accent); margin-bottom: 8px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }

  .btn {
    display: inline-block;
    padding: 8px 16px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: bold;
  }
  .btn:hover { background: #fff; }
  .btn-ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); background: transparent; }
  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
  }
  .btn-danger:hover { background: var(--danger); color: #fff; }

  input, textarea, select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 13px;
    width: 100%;
  }
  textarea { resize: vertical; min-height: 120px; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
  label { display: block; color: var(--muted); margin-bottom: 4px; font-size: 12px; }
  .form-group { margin-bottom: 14px; }

  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 8px; color: var(--muted); font-size: 12px; border-bottom: 1px solid var(--border); }
  td { padding: 10px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 2px;
    font-size: 11px;
    font-weight: bold;
  }
  .badge-news { background: #1a3a1a; color: #5dff5d; }
  .badge-github { background: #1a1a3a; color: #5d9dff; }
  .badge-education { background: #3a2a1a; color: #ffaa5d; }

  .muted { color: var(--muted); font-size: 12px; }
  .mono { font-family: 'Courier New', monospace; }

  .status { padding: 10px; border-radius: 3px; margin: 10px 0; font-size: 13px; }
  .status-ok { background: #1a3a1a; border: 1px solid #2a5a2a; color: #5dff5d; }
  .status-err { background: #3a1a1a; border: 1px solid #5a2a2a; color: #ff5d5d; }

  audio { width: 100%; margin-top: 10px; }

  pre { white-space: pre-wrap; word-break: break-word; line-height: 1.6; }

  .run-btn-wrap { display: flex; align-items: center; gap: 12px; }
  .spinner { display: none; color: var(--muted); }
  .spinner.active { display: inline; }
</style>
</head>
<body>
<nav>
  <span class="brand">// SEGMENT BOT</span>
  <a href="/">Dashboard</a>
  <a href="/feeds">RSS Feeds</a>
  <a href="/repos">GitHub Repos</a>
  <a href="/news">News</a>
  <a href="/reports/github">GitHub</a>
  <a href="/reports/education">Education</a>
  <a href="/settings">Settings</a>
</nav>
<main>
  {% block content %}{% endblock %}
</main>
<script>
function runSegment(endpoint, body, btnId, statusId) {
  const btn = document.getElementById(btnId);
  const status = document.getElementById(statusId);
  btn.disabled = true;
  btn.textContent = 'Running...';
  status.className = 'status';
  status.textContent = 'Working on it...';
  fetch(endpoint, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: body ? JSON.stringify(body) : null
  })
  .then(r => r.json())
  .then(data => {
    btn.disabled = false;
    btn.textContent = btn.dataset.label;
    if (data.error) {
      status.className = 'status status-err';
      status.textContent = 'Error: ' + data.error;
    } else {
      status.className = 'status status-ok';
      status.textContent = 'Done. Reload to see the latest report.';
    }
  })
  .catch(e => {
    btn.disabled = false;
    btn.textContent = btn.dataset.label;
    status.className = 'status status-err';
    status.textContent = 'Request failed: ' + e;
  });
}
</script>
</body>
</html>
